<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Editorial Team - Yupa Historical Studies Journal</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body {
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
            background-color: transparent; 
            margin: 0;
            padding: 5px 5px 30px 5px; 
            overflow: hidden; 
        }
        .yupa-section-title {
            font-size: 1.3rem;
            font-weight: 800;
            color: #0f172a;
            margin: 25px 0 15px 0;
            padding-bottom: 8px;
            border-bottom: 2px solid #e2e8f0;
            display: flex;
            align-items: center;
            gap: 10px;
            width: 100%;
        }
        .yupa-section-title.top { margin-top: 5px; border-bottom-color: #f59e0b; }
        .yupa-section-title i { color: #0f766e; }
        .yupa-section-title.top i { color: #d97706; }

        .yupa-grid {
            display: grid;
            grid-template-columns: repeat(2, minmax(0, 1fr));
            gap: 16px; 
            width: 100%;
            box-sizing: border-box;
            margin-bottom: 20px;
        }
        .yupa-grid-chief {
            display: grid;
            grid-template-columns: 1fr;
            gap: 16px;
            width: 100%;
            box-sizing: border-box;
        }
        .yupa-card {
            background: #ffffff;
            border: 1px solid #e2e8f0;
            border-radius: 12px; 
            padding: 16px;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.01), 0 2px 4px -1px rgba(0, 0, 0, 0.01);
            display: flex;
            flex-direction: row;
            align-items: center; 
            justify-content: flex-start;
            box-sizing: border-box;
            transition: all 0.2s ease;
        }
        .yupa-card.chief-special {
            border-left: 5px solid #f59e0b;
            background: linear-gradient(to right, #fffdfa, #ffffff);
            box-shadow: 0 10px 15px -3px rgba(217, 119, 6, 0.03);
        }
        .yupa-card:hover {
            border-color: #cbd5e1;
            background-color: #f8fafc;
            transform: translateY(-1px);
        }
        .yupa-card.chief-special:hover {
            border-color: #f59e0b;
            background-color: #fffdf5;
        }
        .yupa-left-column { flex-shrink: 0; margin-right: 18px; }
        .yupa-img {
            width: 75px; height: 75px;
            border-radius: 50%; object-fit: cover;
            border: 2px solid #f1f5f9; background-color: #f8fafc; display: block;
        }
        .chief-special .yupa-img { width: 85px; height: 85px; border-color: #fef3c7; }
        .yupa-info-wrapper { display: flex; flex-direction: column; flex-grow: 1; min-width: 0; }
        .yupa-name {
            font-size: 1.15rem; font-weight: 800; color: #0f172a;
            margin: 0 0 2px 0; line-height: 1.3; white-space: normal; word-wrap: break-word;
        }
        .chief-special .yupa-name { font-size: 1.3rem; }
        .yupa-role {
            font-size: 0.76rem; font-weight: 700; color: #64748b;
            text-transform: uppercase; letter-spacing: 0.6px; margin: 0 0 6px 0;
            display: inline-flex; align-items: center; gap: 5px;
        }
        .chief-special .yupa-role { color: #d97706; font-size: 0.82rem; }
        .yupa-inst {
            font-size: 0.88rem; font-weight: 600; color: #475569;     
            margin: 0 0 8px 0; line-height: 1.4; display: flex;
            align-items: center; gap: 6px; white-space: normal; word-wrap: break-word;
        }
        .yupa-inst i { color: #0284c7; font-size: 0.9rem; }
        
        .yupa-expertise-container { display: flex; flex-direction: row; flex-wrap: wrap; gap: 6px; margin: 0 0 12px 0; width: 100%; }
        .yupa-tag {
            font-size: 0.74rem; font-weight: 600; color: #0f766e; background-color: #f0fdfa; 
            padding: 3px 8px; border-radius: 6px; display: inline-flex; align-items: center; gap: 4px;
            border: 1px solid #ccfbf1; white-space: nowrap;
        }
        .yupa-tag i { color: #2dd4bf; font-size: 0.75rem; }
        .yupa-links { display: flex; flex-direction: row; flex-wrap: wrap; gap: 10px; align-items: center; width: 100%; }
        .yupa-btn { display: inline-flex; align-items: center; justify-content: center; text-decoration: none; transition: all 0.2s ease; height: 25px; width: auto; }
        .yupa-btn:hover { transform: translateY(-1.5px); filter: brightness(0.85); }
        .logo-provider { height: 100%; width: auto; object-fit: contain; display: block; }
        .yupa-status { text-align: center; color: #64748b; font-style: italic; padding: 40px 0; }
        @media (max-width: 768px) { .yupa-grid { grid-template-columns: repeat(1, minmax(0, 1fr)); } }
    </style>
</head>
<body>

    <div id="yupa-editorial-outer-wrapper">
        <div class="yupa-status" id="loading-status">
            <i class="fa-solid fa-circle-notch fa-spin"></i> Memproses pembagian struktur redaksi...
        </div>
    </div>

<script>
    document.addEventListener("DOMContentLoaded", function() {
        const outerWrapper = document.getElementById('yupa-editorial-outer-wrapper');
        
        // ID WEB APP TERBARU SUDAH DISUNTIKKAN SECARA PRESISI DI SINI
        const apiUrl = 'https://script.google.com/macros/s/AKfycbyoANhHH9S02o0lz_e4jeOAqs8aLcCGKxr0SUVBqkn2XqeA94ofjtbgDResI7LKV11XZg/exec?sheet=editors&_cb=' + new Date().getTime();
        
        const defaultAvatar = 'https://www.w3schools.com/howto/img_avatar.png';
        const logoUrls = { scholar: 'google scholar.png', scopus: 'scopus.png', sinta: 'sinta.jpg', orcid: 'orcid.jpg' };
        const CACHE_KEY = 'yupa_editors_split_cache';

        function processAndRender(data) {
            if (!data || data.length === 0 || data.error) {
                outerWrapper.innerHTML = `<div class="yupa-status" style="color:#ef4444;"><i class="fa-solid fa-triangle-exclamation"></i> Respon data kosong atau tidak diizinkan oleh sistem.</div>`;
                return;
            }
            outerWrapper.innerHTML = '';

            const chiefList = [];
            const editorialBoardList = [];

            data.forEach(item => {
                const cleanItem = {};
                for (let key in item) {
                    cleanItem[key.toLowerCase().replace(/[^a-z0-9]/g, '')] = item[key];
                }

                const roleText = String(cleanItem['jabatan'] || cleanItem['role'] || '').trim();
                if (roleText.toLowerCase() === 'editor in chief') {
                    chiefList.push(cleanItem);
                } else {
                    if (cleanItem['nama'] && String(cleanItem['nama']).trim() !== "") {
                        editorialBoardList.push(cleanItem);
                    }
                }
            });

            if (chiefList.length > 0) {
                const titleHtml = `<div class="yupa-section-title top"><i class="fa-solid fa-crown"></i> Editor in Chief</div>`;
                const gridChief = document.createElement('div');
                gridChief.className = 'yupa-grid-chief';
                chiefList.forEach(item => { gridChief.appendChild(createCardElement(item, true)); });
                outerWrapper.innerHTML += titleHtml;
                outerWrapper.appendChild(gridChief);
            }

            if (editorialBoardList.length > 0) {
                const titleHtml = `<div class="yupa-section-title"><i class="fa-solid fa-users-gear"></i> Editorial Board</div>`;
                const gridBoard = document.createElement('div');
                gridBoard.className = 'yupa-grid';
                editorialBoardList.forEach(item => { gridBoard.appendChild(createCardElement(item, false)); });
                outerWrapper.innerHTML += titleHtml;
                outerWrapper.appendChild(gridBoard);
            }
        }

        function createCardElement(cleanItem, isChief) {
            let nama = cleanItem['nama'] || '';
            const institusi = cleanItem['institusi'] || '';
            const role = cleanItem['jabatan'] || cleanItem['role'] || 'Editor';
            const keahlianRaw = cleanItem['keahlian'] || cleanItem['bidangkeahlian'] || '';
            
            const linkGS = cleanItem['googlescholar'] || cleanItem['linkgs'] || '';
            const linkSinta = cleanItem['sintaid'] || cleanItem['linksinta'] || '';
            const linkScopus = cleanItem['scopusid'] || cleanItem['linkscopus'] || '';
            const linkOrcid = cleanItem['orcid'] || cleanItem['linkorcid'] || '';
            const foto = cleanItem['foto'] || '';

            const card = document.createElement('div');
            card.className = isChief ? 'yupa-card chief-special' : 'yupa-card';
            const imageSrc = (foto && String(foto).trim() !== "") ? String(foto).trim() : defaultAvatar;

            let expertiseHtml = '';
            if (keahlianRaw && keahlianRaw.toString().trim() !== "") {
                expertiseHtml = '<div class="yupa-expertise-container">';
                const daftarKeahlian = keahlianRaw.toString().split(',');
                daftarKeahlian.forEach(keahlianTunggal => {
                    const teksBersih = keahlianTunggal.trim();
                    if (teksBersih !== "") { expertiseHtml += `<span class="yupa-tag"><i class="fa-solid fa-tag"></i>${teksBersih}</span>`; }
                });
                expertiseHtml += '</div>';
            }

            let buttonsHtml = '';
            if (linkGS && linkGS.toString().trim() !== "") { buttonsHtml += `<a href="${linkGS}" target="_blank" class="yupa-btn" title="Google Scholar"><img src="${encodeURIComponent(logoUrls.scholar)}" class="logo-provider" alt="Google Scholar"></a>`; }
            if (linkScopus && linkScopus.toString().trim() !== "") { buttonsHtml += `<a href="${linkScopus}" target="_blank" class="yupa-btn" title="Scopus"><img src="${logoUrls.scopus}" class="logo-provider" alt="Scopus"></a>`; }
            if (linkSinta && linkSinta.toString().trim() !== "") { buttonsHtml += `<a href="${linkSinta}" target="_blank" class="yupa-btn" title="SINTA ID"><img src="${logoUrls.sinta}" class="logo-provider" alt="SINTA"></a>`; }
            if (linkOrcid && linkOrcid.toString().trim() !== "") { buttonsHtml += `<a href="${linkOrcid}" target="_blank" class="yupa-btn" title="ORCID iD"><img src="${logoUrls.orcid}" class="logo-provider" alt="ORCID"></a>`; }

            const iconShield = isChief ? 'fa-solid fa-crown' : 'fa-solid fa-user-shield';

            card.innerHTML = `
                <div class="yupa-left-column"><img src="${imageSrc}" alt="${nama}" class="yupa-img" onerror="this.src='${defaultAvatar}'"></div>
                <div class="yupa-info-wrapper">
                    <div class="yupa-name">${nama}</div>
                    <div class="yupa-role"><i class="${iconShield}"></i> ${role}</div>
                    <div class="yupa-inst"><i class="fa-solid fa-university"></i> ${institusi}</div>
                    ${expertiseHtml}
                    <div class="yupa-links">${buttonsHtml}</div>
                </div>
            `;
            return card;
        }

        const dataCacheLokal = localStorage.getItem(CACHE_KEY);
        if (dataCacheLokal) { processAndRender(JSON.parse(dataCacheLokal)); }

        fetch(apiUrl)
            .then(response => response.json())
            .then(dataCloud => {
                if (dataCloud && dataCloud.length > 0) {
                    const stringDataCloud = JSON.stringify(dataCloud);
                    if (stringDataCloud !== dataCacheLokal) {
                        localStorage.setItem(CACHE_KEY, stringDataCloud);
                        processAndRender(dataCloud); 
                    }
                }
            })
            .catch(error => { 
                console.error("Gagal sinkronisasi data:", error);
                if(!dataCacheLokal) {
                    outerWrapper.innerHTML = `<div class="yupa-status" style="color:#ef4444;"><i class="fa-solid fa-network-wired"></i> Gagal terhubung ke Google API. Pastikan setelan akses Apps Script adalah 'Anyone'.</div>`;
                }
            });
    });
</script>
</body>
</html>
