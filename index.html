<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reviewers 2-Column Grid - Big Text Layout</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body {
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
            background-color: transparent; 
            margin: 0;
            padding: 5px 5px 30px 5px; 
            overflow: hidden; 
        }

        /* Susunan menjadi 2 kolom berjejer kesamping */
        .yupa-grid {
            display: grid;
            grid-template-columns: repeat(2, minmax(0, 1fr));
            gap: 16px; /* Jarak antar kartu sedikit diperlonggar agar lebih mewah */
            width: 100%;
            box-sizing: border-box;
        }

        /* Desain kartu utama */
        .yupa-card {
            background: #ffffff;
            border: 1px solid #e2e8f0;
            border-radius: 12px; /* Sudut kartu dibuat lebih lembut */
            padding: 16px;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.01), 0 2px 4px -1px rgba(0, 0, 0, 0.01);
            display: flex;
            flex-direction: row;
            align-items: flex-start; /* Sejajar dari atas karena kolom kiri akan memanjang ke bawah */
            justify-content: flex-start;
            box-sizing: border-box;
            transition: all 0.2s ease;
        }

        .yupa-card:hover {
            border-color: #cbd5e1;
            background-color: #f8fafc;
            transform: translateY(-1px);
        }

        /* PERBAIKAN: Kolom Kiri Kustom (Khusus Foto + Barisan Logo Vertikal) */
        .yupa-left-column {
            display: flex;
            flex-direction: column;
            align-items: center;
            margin-right: 18px; /* Jarak kolom kiri ke kolom teks kanan */
            flex-shrink: 0;
            width: 65px; /* Lebar dikunci agar simetris vertikal */
        }

        /* Ukuran foto profil disesuaikan agar seimbang */
        .yupa-img {
            width: 60px;
            height: 60px;
            border-radius: 50%;
            object-fit: cover;
            border: 2px solid #f1f5f9;
            background-color: #f8fafc;
            margin-bottom: 10px; /* Jarak foto ke logo pertama di bawahnya */
        }

        /* Susunan logo kustom vertikal ke bawah di bawah foto */
        .yupa-links {
            display: flex;
            flex-direction: column;
            gap: 5px; /* Jarak antar badge vertikal */
            width: 100%;
            align-items: center;
        }

        /* Tombol penampung badge persegi panjang horizontal */
        .yupa-btn {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            text-decoration: none;
            transition: all 0.2s ease;
            height: 18px; /* Diperkecil sedikit agar pas secara vertikal di bawah foto */
            width: auto;  
        }

        .yupa-btn:hover {
            transform: scale(1.05);
            filter: brightness(0.95);
        }

        .logo-provider {
            height: 100%;
            width: auto;
            object-fit: contain;
            display: block;
        }


        /* PERBAIKAN: Kolom Kanan Kustom (Fokus Teks Ukuran JUMBO) */
        .yupa-info-wrapper {
            display: flex;
            flex-direction: column;
            flex-grow: 1;
            min-width: 0;
            padding-top: 2px; /* Penyelarasan vertikal dengan puncak foto */
        }

        /* Ukuran font NAMA dinaikkan menjadi besar dan tegas */
        .yupa-name {
            font-size: 1.05rem; /* Sebelumnya 0.88rem (Naik signifikan) */
            font-weight: 700;   /* Lebih tebal dan elegan */
            color: #0f172a;
            margin: 0 0 6px 0;
            line-height: 1.3;
            white-space: normal; /* Mengizinkan teks turun ke bawah jika nama sangat panjang */
            word-wrap: break-word;
        }

        /* Ukuran font INSTITUSI dinaikkan agar terbaca jelas */
        .yupa-inst {
            font-size: 0.85rem; /* Sebelumnya 0.74rem (Naik signifikan) */
            color: #475569;
            margin: 0;
            line-height: 1.4;
            display: flex;
            align-items: flex-start; /* Ikon kampus tetap di atas jika teks memanjang dua baris */
            gap: 6px;
            white-space: normal;
            word-wrap: break-word;
        }

        .yupa-inst i {
            color: #0284c7; /* Warna ikon kampus dibuat biru segar */
            font-size: 0.85rem;
            margin-top: 3px; /* Penyelarasan center-top dengan teks */
        }


        /* Desain Kontainer Loading Spinner Animasi */
        .yupa-loading-container {
            grid-column: 1 / -1;
            text-align: center;
            padding: 50px 0;
            color: #64748b;
            font-size: 0.9rem;
        }

        .yupa-spinner {
            font-size: 2.2rem;
            color: #0284c7;
            margin-bottom: 12px;
        }

        .yupa-status {
            text-align: center;
            color: #64748b;
            font-style: italic;
            padding: 20px 0;
            grid-column: 1 / -1;
        }

        /* Responsif mobile */
        @media (max-width: 768px) {
            .yupa-grid { grid-template-columns: repeat(1, minmax(0, 1fr)); }
        }
    </style>
</head>
<body>

    <div class="yupa-grid" id="team-grid">
        <div class="yupa-loading-container" id="loading-spinner">
            <i class="fa-solid fa-circle-notch fa-spin yupa-spinner"></i>
            <div>Menghubungkan ke server basis data...</div>
        </div>
    </div>

<script>
    document.addEventListener("DOMContentLoaded", function() {
        const gridContainer = document.getElementById('team-grid');
        const apiUrl = 'https://script.google.com/macros/s/AKfycbwREzVUx42kFPi1pWgwUCdn0xi_ZF2GazKK5ZM2N9ZLV4f56rPy5KhKC4-yZ7lTwDvEww/exec';
        const defaultAvatar = 'https://www.w3schools.com/howto/img_avatar.png';

        // Memanggil file gambar horizontal resmi dari repositori GitHub Anda
        const logoUrls = {
            scholar: 'google scholar.png', 
            scopus: 'scopus.png',
            sinta: 'sinta.jpg',
            orcid: 'orcid.jpg'
        };

        fetch(apiUrl)
            .then(response => response.json())
            .then(data => {
                gridContainer.innerHTML = ''; 

                if (!data || data.length === 0) {
                    gridContainer.innerHTML = '<div class="yupa-status">Belum ada data reviewer terisi di spreadsheet.</div>';
                    return;
                }

                data.forEach(item => {
                    const cleanItem = {};
                    for (let key in item) {
                        cleanItem[key.toLowerCase().replace(/[^a-z0-9]/g, '')] = item[key];
                    }

                    let nama = cleanItem['nama'] || '';
                    if (!nama) {
                        const keys = Object.keys(cleanItem);
                        for (let k of keys) {
                            let val = String(cleanItem[k]).trim();
                            if (val && isNaN(val) && !val.includes("http") && !k.includes("institut") && !k.includes("usernam")) {
                                nama = val;
                                break;
                            }
                        }
                    }

                    const institusi = cleanItem['institusi'] || '';
                    const linkGS = cleanItem['googlescholar'] || cleanItem['linkgs'] || '';
                    const linkSinta = cleanItem['sintaid'] || cleanItem['linksinta'] || '';
                    const linkScopus = cleanItem['scopusid'] || cleanItem['linkscopus'] || '';
                    const linkOrcid = cleanItem['orcid'] || cleanItem['linkorcid'] || cleanItem['orcidid'] || '';
                    const foto = cleanItem['foto'] || cleanItem['fotogs'] || '';

                    if (!nama || String(nama).trim() === "") return;

                    const card = document.createElement('div');
                    card.className = 'yupa-card';

                    const imageSrc = (foto && String(foto).trim() !== "") ? String(foto).trim() : defaultAvatar;

                    // Merakit HTML untuk barisan badge vertikal kustom
                    let buttonsHtml = '';
                    if (linkGS && linkGS.toString().trim() !== "") {
                        buttonsHtml += `<a href="${linkGS}" target="_blank" class="yupa-btn" title="Google Scholar"><img src="${encodeURIComponent(logoUrls.scholar)}" class="logo-provider" alt="Google Scholar"></a>`;
                    }
                    if (linkScopus && linkScopus.toString().trim() !== "") {
                        buttonsHtml += `<a href="${linkScopus}" target="_blank" class="yupa-btn" title="Scopus"><img src="${logoUrls.scopus}" class="logo-provider" alt="Scopus"></a>`;
                    }
                    if (linkSinta && linkSinta.toString().trim() !== "") {
                        buttonsHtml += `<a href="${linkSinta}" target="_blank" class="yupa-btn" title="SINTA ID"><img src="${logoUrls.sinta}" class="logo-provider" alt="SINTA"></a>`;
                    }
                    if (linkOrcid && linkOrcid.toString().trim() !== "") {
                        buttonsHtml += `<a href="${linkOrcid}" target="_blank" class="yupa-btn" title="ORCID iD"><img src="${logoUrls.orcid}" class="logo-provider" alt="ORCID"></a>`;
                    }

                    // LAYOUT BARU: Struktur dibagi tegas menjadi yupa-left-column (kiri) dan yupa-info-wrapper (kanan)
                    card.innerHTML = `
                        <div class="yupa-left-column">
                            <img src="${imageSrc}" alt="${nama}" class="yupa-img" onerror="this.src='${defaultAvatar}'">
                            <div class="yupa-links">${buttonsHtml}</div>
                        </div>
                        <div class="yupa-info-wrapper">
                            <div class="yupa-name">${nama}</div>
                            <div class="yupa-inst"><i class="fa-solid fa-university"></i> ${institusi}</div>
                        </div>
                    `;
                    gridContainer.appendChild(card);
                });
            })
            .catch(error => {
                console.error('Error:', error);
                gridContainer.innerHTML = '<div class="yupa-status" style="color: #ef4444;">Gagal memuat data dari Spreadsheet.</div>';
            });
    });
</script>
</body>
</html>
