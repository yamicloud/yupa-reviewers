<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reviewers Jurnal Yupa - International Standardization Layout</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body {
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
            background-color: transparent; 
            margin: 0;
            padding: 5px 5px 30px 5px; 
            overflow: hidden; 
        }
        .yupa-grid {
            display: grid;
            grid-template-columns: repeat(2, minmax(0, 1fr));
            gap: 16px; 
            width: 100%;
            box-sizing: border-box;
        }
        .yupa-card {
            background: #ffffff;
            border: 1px solid #e2e8f0;
            border-radius: 12px; 
            padding: 16px;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.01), 0 2px 4px -1px rgba(0, 0, 0, 0.01);
            display: flex;
            flex-direction: row;
            align-items: center; 
            justify-content: flex-start;
            box-sizing: border-box;
            transition: all 0.2s ease;
        }
        .yupa-card:hover {
            border-color: #cbd5e1;
            background-color: #f8fafc;
            transform: translateY(-1px);
        }
        .yupa-left-column {
            flex-shrink: 0;
            margin-right: 18px; 
        }
        .yupa-img {
            width: 70px; 
            height: 70px;
            border-radius: 50%;
            object-fit: cover;
            border: 2px solid #f1f5f9;
            background-color: #f8fafc;
            display: block;
        }
        .yupa-info-wrapper {
            display: flex;
            flex-direction: column;
            flex-grow: 1;
            min-width: 0;
        }
        .yupa-name {
            font-size: 1.15rem; 
            font-weight: 800;   
            color: #0f172a;
            margin: 0 0 4px 0;
            line-height: 1.3;
            white-space: normal; 
            word-wrap: break-word;
        }
        .yupa-inst {
            font-size: 0.88rem; 
            font-weight: 600;   
            color: #475569;     
            margin: 0 0 6px 0; 
            line-height: 1.4;
            display: flex;
            align-items: center; 
            gap: 6px;
            white-space: normal;
            word-wrap: break-word;
        }
        .yupa-inst i { color: #0284c7; font-size: 0.9rem; }
        
        /* DESAIN BADGE KEAHLIAN BARU DENGAN INDIKATOR IKON */
        .yupa-expertise {
            font-size: 0.78rem;
            font-weight: 500;
            color: #0369a1; /* Warna teks biru tua elegan */
            background-color: #f0f9ff; /* Background biru muda soft */
            padding: 4px 10px;
            border-radius: 6px;
            margin: 0 0 10px 0;
            display: inline-flex;
            align-items: center;
            gap: 6px; /* Jarak ikon ke teks keahlian */
            align-self: flex-start;
            max-width: 100%;
            white-space: normal;
            word-wrap: break-word;
            border: 1px solid #e0f2fe;
        }
        .yupa-expertise i {
            color: #38bdf8; /* Warna ikon langit segar */
            font-size: 0.8rem;
            flex-shrink: 0;
        }

        .yupa-links {
            display: flex;
            flex-direction: row; 
            flex-wrap: wrap;
            gap: 10px; 
            align-items: center;
            width: 100%;
        }
        .yupa-btn {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            text-decoration: none;
            transition: all 0.2s ease;
            height: 25px; 
            width: auto;  
        }
        .yupa-btn:hover { transform: translateY(-1.5px); filter: brightness(0.85); }
        .logo-provider { height: 100%; width: auto; object-fit: contain; display: block; }
        .yupa-status { text-align: center; color: #64748b; font-style: italic; padding: 40px 0; grid-column: 1 / -1; }
        @media (max-width: 768px) { .yupa-grid { grid-template-columns: repeat(1, minmax(0, 1fr)); } }
    </style>
</head>
<body>

    <div class="yupa-grid" id="team-grid"></div>

<script>
    document.addEventListener("DOMContentLoaded", function() {
        const gridContainer = document.getElementById('team-grid');
        
        const apiUrl = 'https://script.google.com/macros/s/AKfycbyhFxkrB4QKeqSNmPYGH1qlU2y6F_PdJuAxitHeb7GOSj3DlIA2UUk3VLZdSlhtq8jfmg/exec?_cb=' + new Date().getTime();
        
        const defaultAvatar = 'https://www.w3schools.com/howto/img_avatar.png';
        const logoUrls = { scholar: 'google scholar.png', scopus: 'scopus.png', sinta: 'sinta.jpg', orcid: 'orcid.jpg' };
        
        const CACHE_KEY = 'yupa_reviewers_data_cache';

        function renderDataGrid(data) {
            if (!data || data.length === 0) return;
            
            gridContainer.innerHTML = ''; 
            data.forEach(item => {
                const cleanItem = {};
                for (let key in item) {
                    cleanItem[key.toLowerCase().replace(/[^a-z0-9]/g, '')] = item[key];
                }

                let nama = cleanItem['nama'] || '';
                const institusi = cleanItem['institusi'] || '';
                
                // Otomatis membaca kolom bernama "Keahlian" atau "Bidang Keahlian" di Spreadsheet Anda
                const keahlian = cleanItem['keahlian'] || cleanItem['bidangkeahlian'] || cleanItem['expert'] || '';
                
                const linkGS = cleanItem['googlescholar'] || cleanItem['linkgs'] || '';
                const linkSinta = cleanItem['sintaid'] || cleanItem['linksinta'] || '';
                const linkScopus = cleanItem['scopusid'] || cleanItem['linkscopus'] || '';
                const linkOrcid = cleanItem['orcid'] || cleanItem['linkorcid'] || cleanItem['orcidid'] || '';
                const foto = cleanItem['foto'] || cleanItem['fotogs'] || '';

                if (!nama || String(nama).trim() === "") return;

                const card = document.createElement('div');
                card.className = 'yupa-card';
                const imageSrc = (foto && String(foto).trim() !== "") ? String(foto).trim() : defaultAvatar;

                // Suntik Ikon Tag Dinamis ke dalam Badge Keahlian
                let expertiseHtml = '';
                if (keahlian && keahlian.toString().trim() !== "") {
                    expertiseHtml = `<div class="yupa-expertise"><i class="fa-solid fa-tags"></i> ${keahlian}</div>`;
                }

                let buttonsHtml = '';
                if (linkGS && linkGS.toString().trim() !== "") {
                    buttonsHtml += `<a href="${linkGS}" target="_blank" class="yupa-btn" title="Google Scholar"><img src="${encodeURIComponent(logoUrls.scholar)}" class="logo-provider" alt="Google Scholar"></a>`;
                }
                if (linkScopus && linkScopus.toString().trim() !== "") {
                    buttonsHtml += `<a href="${linkScopus}" target="_blank" class="yupa-btn" title="Scopus"><img src="${logoUrls.scopus}" class="logo-provider" alt="Scopus"></a>`;
                }
                if (linkSinta && linkSinta.toString().trim() !== "") {
                    buttonsHtml += `<a href="${linkSinta}" target="_blank" class="yupa-btn" title="SINTA ID"><img src="${logoUrls.sinta}" class="logo-provider" alt="SINTA"></a>`;
                }
                if (linkOrcid && linkOrcid.toString().trim() !== "") {
                    buttonsHtml += `<a href="${linkOrcid}" target="_blank" class="yupa-btn" title="ORCID iD"><img src="${logoUrls.orcid}" class="logo-provider" alt="ORCID"></a>`;
                }

                card.innerHTML = `
                    <div class="yupa-left-column"><img src="${imageSrc}" alt="${nama}" class="yupa-img" onerror="this.src='${defaultAvatar}'"></div>
                    <div class="yupa-info-wrapper">
                        <div class="yupa-name">${nama}</div>
                        <div class="yupa-inst"><i class="fa-solid fa-university"></i> ${institusi}</div>
                        ${expertiseHtml}
                        <div class="yupa-links">${buttonsHtml}</div>
                    </div>
                `;
                gridContainer.appendChild(card);
            });
        }

        // Ambil data cache lokal (0 Detik)
        const dataCacheLokal = localStorage.getItem(CACHE_KEY);
        if (dataCacheLokal) {
            renderDataGrid(JSON.parse(dataCacheLokal));
        } else {
            gridContainer.innerHTML = '<div class="yupa-status"><i class="fa-solid fa-circle-notch fa-spin"></i> Sinkronisasi sistem indeksasi internasional...</div>';
        }

        // Ambil data dari spreadsheet di latar belakang
        fetch(apiUrl)
            .then(response => response.json())
            .then(dataCloud => {
                if (dataCloud && dataCloud.length > 0) {
                    const stringDataCloud = JSON.stringify(dataCloud);
                    if (stringDataCloud !== dataCacheLokal) {
                        localStorage.setItem(CACHE_KEY, stringDataCloud);
                        renderDataGrid(dataCloud); 
                    }
                }
            })
            .catch(error => {
                console.error("Gagal sinkronisasi background fetch:", error);
                if (!dataCacheLokal) {
                    gridContainer.innerHTML = '<div class="yupa-status" style="color: #ef4444;">Gagal memuat basis data reviewer.</div>';
                }
            });
    });
</script>
</body>
</html>
